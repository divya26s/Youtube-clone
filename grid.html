<!DOCTYPE html>
<html>
    <head>
        <title>Grid Practice</title>
    </head>
    <body>
      <div style="
     margin-top: 30px;
      display: grid;
      grid-template-columns: 100px 100px 200px;">
     <div style="background-color: lightblue;">column 1</div>
     <div style="background-color: lightpink">column 1</div>
     <div style="background-color: lightblue">column 3</div>
     <div style="background-color: lightgreen;">row 2</div>
     <div style="background-color: violet;">row 2</div> 
     <div style="background-color: pink;">row 3</div>
     </div>

     <div style="
     margin-top: 30px;
      display: grid;
      grid-template-columns: 100px 1fr 2fr;">
     <div style="background-color: lightblue;">column 1</div>
     <div style="background-color: lightpink">1fr</div>
     <div style="background-color: lightblue">2fr</div>
     </div>
     </body>
</html>
